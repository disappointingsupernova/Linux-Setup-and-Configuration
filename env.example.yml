# =============================================================================
# Environment Configuration
# =============================================================================
# Copy this file to env.yml and fill in your values.
# env.yml is gitignored and will NOT be committed.
# =============================================================================

# ---------------------------------------------------------------------------
# Target Hosts
# ---------------------------------------------------------------------------
target_user: deploy
target_hosts: all

# ---------------------------------------------------------------------------
# SSH Configuration
# ---------------------------------------------------------------------------
ssh_port: 22
ssh_permit_root_login: "no"
ssh_password_authentication: "no"
ssh_pubkey_authentication: "yes"
ssh_max_auth_tries: 3
ssh_authorised_keys:
  - "ssh-ed25519 AAAA... your-key-comment"

# ---------------------------------------------------------------------------
# Firewall (UFW)
# ---------------------------------------------------------------------------
firewall_enabled: true
firewall_allowed_tcp_ports:
  - 22
firewall_allowed_udp_ports: []

# ---------------------------------------------------------------------------
# Additional Users (optional)
# ---------------------------------------------------------------------------
# additional_users:
#   - name: alice
#     groups: "sudo"
#     sudo: true
#     ssh_keys:
#       - "ssh-ed25519 AAAA... alice-key"
#   - name: bob
#     groups: ""
#     ssh_keys:
#       - "ssh-ed25519 AAAA... bob-key"

# ---------------------------------------------------------------------------
# Optional Roles (set to true to enable)
# ---------------------------------------------------------------------------
enable_timezone: true
enable_syslog: false
enable_journald: true
enable_fail2ban: true
enable_unattended_upgrades: true
enable_ntp: true
enable_swap: false
enable_logrotate: true
enable_motd: true
enable_auditd: false
enable_node_exporter: false
enable_dns: false
enable_clamav: false
enable_lynis: false
enable_tuning: false
enable_caddy: false
enable_wireguard: false
enable_docker: false

# ---------------------------------------------------------------------------
# Timezone & Locale (only used if enable_timezone: true)
# ---------------------------------------------------------------------------
system_timezone: "Europe/London"
system_locale: "en_GB.UTF-8"

# ---------------------------------------------------------------------------
# Syslog Forwarding (only used if enable_syslog: true)
# ---------------------------------------------------------------------------
syslog_server: "logs.example.com"
syslog_port: 514
syslog_protocol: "tcp"  # tcp or udp

# ---------------------------------------------------------------------------
# Journald (only used if enable_journald: true)
# ---------------------------------------------------------------------------
journald_max_use: "500M"
journald_max_file_size: "50M"
journald_max_retention: "1month"

# ---------------------------------------------------------------------------
# Fail2ban (only used if enable_fail2ban: true)
# ---------------------------------------------------------------------------
fail2ban_bantime: 3600
fail2ban_findtime: 600
fail2ban_maxretry: 5
fail2ban_ignoreip: "127.0.0.1/8"

# ---------------------------------------------------------------------------
# NTP (only used if enable_ntp: true)
# ---------------------------------------------------------------------------
ntp_servers:
  - "0.uk.pool.ntp.org"
  - "1.uk.pool.ntp.org"
  - "2.uk.pool.ntp.org"
  - "3.uk.pool.ntp.org"
ntp_timezone: "Europe/London"

# ---------------------------------------------------------------------------
# Swap (only used if enable_swap: true)
# ---------------------------------------------------------------------------
swap_file_path: /swapfile
swap_size: "2G"
swap_swappiness: "10"

# ---------------------------------------------------------------------------
# Logrotate (only used if enable_logrotate: true)
# ---------------------------------------------------------------------------
logrotate_rules:
  - path: "/var/log/syslog"
    frequency: daily
    rotate: 14
    compress: true
    delaycompress: true
    postrotate: "systemctl reload rsyslog 2>/dev/null || true"
  - path: "/var/log/auth.log"
    frequency: weekly
    rotate: 8
    compress: true

# ---------------------------------------------------------------------------
# MOTD (only used if enable_motd: true)
# ---------------------------------------------------------------------------
# motd_warning_message: "Authorised users only. Activity is monitored."

# ---------------------------------------------------------------------------
# Auditd (only used if enable_auditd: true)
# ---------------------------------------------------------------------------
# Uses sensible CIS-benchmark-inspired defaults. No additional configuration
# needed unless you want to extend the rules in the template.

# ---------------------------------------------------------------------------
# Node Exporter (only used if enable_node_exporter: true)
# ---------------------------------------------------------------------------
node_exporter_version: "1.7.0"
node_exporter_port: 9100

# ---------------------------------------------------------------------------
# DNS (only used if enable_dns: true)
# ---------------------------------------------------------------------------
dns_nameservers:
  - "1.1.1.1"
  - "9.9.9.9"
dns_fallback_servers:
  - "8.8.8.8"
  - "8.8.4.4"
dns_over_tls: false
dns_dnssec: false

# ---------------------------------------------------------------------------
# ClamAV (only used if enable_clamav: true)
# ---------------------------------------------------------------------------
clamav_scan_schedule: "0 2 * * 0"  # Weekly, Sundays at 02:00
clamav_scan_paths: "/home /var /tmp"

# ---------------------------------------------------------------------------
# Lynis (only used if enable_lynis: true)
# ---------------------------------------------------------------------------
lynis_cron_hour: "3"
lynis_cron_minute: "0"
lynis_cron_weekday: "1"  # Monday

# ---------------------------------------------------------------------------
# System Tuning (only used if enable_tuning: true)
# ---------------------------------------------------------------------------
tuning_file_max: "2097152"
tuning_somaxconn: "65535"
tuning_nofile_soft: "65535"
tuning_nofile_hard: "65535"

# ---------------------------------------------------------------------------
# Caddy (only used if enable_caddy: true)
# ---------------------------------------------------------------------------
# caddy_sites:
#   - domain: "example.com"
#     reverse_proxy: "localhost:8080"
#     tls_email: "you@example.com"
#     headers:
#       X-Frame-Options: "DENY"
#       X-Content-Type-Options: "nosniff"

# ---------------------------------------------------------------------------
# WireGuard (only used if enable_wireguard: true)
# ---------------------------------------------------------------------------
# wireguard_interface: wg0
# wireguard_address: "10.0.0.1/24"
# wireguard_port: 51820
# wireguard_private_key: "<your-private-key>"
# wireguard_post_up: "iptables -A FORWARD -i wg0 -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE"
# wireguard_post_down: "iptables -D FORWARD -i wg0 -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE"
# wireguard_peers:
#   - public_key: "<peer-public-key>"
#     allowed_ips: "10.0.0.2/32"
#     persistent_keepalive: 25

# ---------------------------------------------------------------------------
# Docker (only used if enable_docker: true)
# ---------------------------------------------------------------------------
docker_users:
  - "{{ target_user }}"
