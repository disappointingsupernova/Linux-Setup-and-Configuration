---
- name: Set system locale
  ansible.builtin.locale_gen:
    name: "{{ system_locale | default('en_GB.UTF-8') }}"
    state: present

- name: Set default locale
  ansible.builtin.copy:
    dest: /etc/default/locale
    content: |
      LANG={{ system_locale | default('en_GB.UTF-8') }}
      LC_ALL={{ system_locale | default('en_GB.UTF-8') }}
    owner: root
    group: root
    mode: "0644"

- name: Set system timezone
  community.general.timezone:
    name: "{{ system_timezone | default('Europe/London') }}"
