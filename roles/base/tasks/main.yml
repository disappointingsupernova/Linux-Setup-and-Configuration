---
- name: Install essential packages
  ansible.builtin.apt:
    name:
      - ufw
      - curl
      - wget
      - vim
      - htop
      - git
      - unzip
      - software-properties-common
      - apt-transport-https
      - ca-certificates
      - gnupg
    state: present

- name: Create deploy user
  ansible.builtin.user:
    name: "{{ target_user }}"
    shell: /bin/bash
    groups: sudo
    append: true
    create_home: true

- name: Set authorised keys for deploy user
  ansible.posix.authorized_key:
    user: "{{ target_user }}"
    state: present
    key: "{{ item }}"
  loop: "{{ ssh_authorised_keys }}"

- name: Deploy sshd_config
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: "0644"
    validate: "sshd -t -f %s"
  notify: Restart sshd

- name: Configure UFW defaults
  community.general.ufw:
    direction: "{{ item.direction }}"
    policy: "{{ item.policy }}"
  loop:
    - { direction: incoming, policy: deny }
    - { direction: outgoing, policy: allow }
  when: firewall_enabled | default(true) | bool

- name: Allow TCP ports through UFW
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ firewall_allowed_tcp_ports }}"
  when: firewall_enabled | default(true) | bool

- name: Allow UDP ports through UFW
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: udp
  loop: "{{ firewall_allowed_udp_ports }}"
  when: firewall_enabled | default(true) | bool and (firewall_allowed_udp_ports | length > 0)

- name: Enable UFW
  community.general.ufw:
    state: enabled
  when: firewall_enabled | default(true) | bool

- name: Set kernel hardening parameters
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    sysctl_set: true
    reload: true
  loop:
    - { name: "net.ipv4.conf.all.rp_filter", value: "1" }
    - { name: "net.ipv4.conf.default.rp_filter", value: "1" }
    - { name: "net.ipv4.icmp_echo_ignore_broadcasts", value: "1" }
    - { name: "net.ipv4.conf.all.accept_redirects", value: "0" }
    - { name: "net.ipv4.conf.default.accept_redirects", value: "0" }
    - { name: "net.ipv4.conf.all.send_redirects", value: "0" }
    - { name: "net.ipv4.conf.default.send_redirects", value: "0" }
    - { name: "net.ipv4.conf.all.accept_source_route", value: "0" }
    - { name: "net.ipv4.conf.default.accept_source_route", value: "0" }

- name: Disable unused filesystems
  ansible.builtin.copy:
    dest: "/etc/modprobe.d/disable-{{ item }}.conf"
    content: "install {{ item }} /bin/true\n"
    owner: root
    group: root
    mode: "0644"
  loop:
    - cramfs
    - freevxfs
    - jffs2
    - hfs
    - hfsplus
    - squashfs
    - udf
