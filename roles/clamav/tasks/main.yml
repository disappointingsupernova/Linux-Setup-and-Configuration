---
- name: Install ClamAV
  ansible.builtin.apt:
    name:
      - clamav
      - clamav-daemon
      - clamav-freshclam
    state: present

- name: Stop freshclam for initial database update
  ansible.builtin.systemd:
    name: clamav-freshclam
    state: stopped

- name: Update ClamAV virus database
  ansible.builtin.command:
    cmd: freshclam
  changed_when: true

- name: Ensure freshclam is enabled and running
  ansible.builtin.systemd:
    name: clamav-freshclam
    enabled: true
    state: started

- name: Ensure clamav-daemon is enabled and running
  ansible.builtin.systemd:
    name: clamav-daemon
    enabled: true
    state: started

- name: Deploy scheduled scan cron job
  ansible.builtin.template:
    src: clamav-scan.cron.j2
    dest: /etc/cron.d/clamav-scan
    owner: root
    group: root
    mode: "0644"
